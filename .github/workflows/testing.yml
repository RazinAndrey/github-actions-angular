name: Test Angular App
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # берем текущий код с виртуальной машины
      - name: Get repository code
        uses: actions/checkout@v6

      # установка зависимостей
      - name: Install dependencies
        run: npm ci

      - name: Test application
        run: npm run test
