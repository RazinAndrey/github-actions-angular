name: Deploy Angular App

on:
  # делаем push только в main
  push:
    branches:
      - main

    # игнорирем файлы, чтоб лишний раз не запускать изменения
    # paths-ignore:
    #   - '.github/workflows/*'

jobs:
  test:
    # запускаем на ubuntu
    runs-on: ubuntu-latest
    steps:
      # берем текущий код с виртуальной машины
      - name: Get repository code
        uses: actions/checkout@v6

      # кэшируем зависимости
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package-lock.json') }}

      # установка зависимостей
      - name: Install dependencies
        run: npm ci

      # запускаем скрипт
      - name: Test application
        run: npm run test
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v6

      # кэшируем зависимости
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Lint application
        run: npm run lint
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Get repository code
        uses: actions/checkout@v6

      # кэшируем зависимости
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Deploy
        run: echo Deploying...
